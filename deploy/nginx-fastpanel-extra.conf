# Crynova — ТОЛЬКО если в основном конфиге FastPanel НЕТ try_files / location /
#
# НЕ вставляйте, если конфиг сайта уже содержит:
#   location / { try_files $uri /index.php?$query_string; }
# Дубликат location / ломает маршруты Laravel.
#
# Безопасно добавить только блоки ниже (скрытые файлы):

location ~ /\.(?!well-known).* {
    deny all;
}
