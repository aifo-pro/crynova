<svg width="1040" height="700" viewBox="0 0 1040 700" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Crynova merchant payment flow</title>
  <desc id="desc">A premium light SaaS illustration showing merchant checkout, Crynova processing, customer crypto payment, paid status, confirmations, and webhook delivery.</desc>
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="170%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <linearGradient id="surface" x1="84" y1="68" x2="955" y2="623" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="0.52" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F2FFFD"/>
    </linearGradient>
    <linearGradient id="brand" x1="394" y1="128" x2="640" y2="374" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="success" x1="745" y1="469" x2="908" y2="534" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10B981"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="flowBlue" x1="246" y1="305" x2="794" y2="305" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" stroke="#E2E8F0" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1040" height="700" rx="44" fill="#FFFFFF"/>
  <rect x="36" y="40" width="968" height="604" rx="38" fill="url(#surface)" stroke="#DDE7F3"/>
  <rect x="36" y="408" width="968" height="236" rx="38" fill="url(#grid)" opacity="0.38"/>

  <path d="M279 300C325 300 350 300 390 300" stroke="url(#flowBlue)" stroke-width="7" stroke-linecap="round"/>
  <path d="M372 284L390 300L372 316" stroke="#2563EB" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M650 300C696 300 723 300 761 300" stroke="url(#flowBlue)" stroke-width="7" stroke-linecap="round"/>
  <path d="M743 284L761 300L743 316" stroke="#06B6D4" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#cardShadow)">
    <rect x="92" y="164" width="230" height="330" rx="30" fill="#FFFFFF" stroke="#E2E8F0"/>
    <rect x="92" y="164" width="230" height="78" rx="30" fill="#F8FAFC"/>
    <rect x="92" y="212" width="230" height="30" fill="#F8FAFC"/>
    <circle cx="130" cy="203" r="18" fill="#EFF6FF"/>
    <path d="M121 207H139M126 207V194H134V207" stroke="#2563EB" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="162" y="200" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">Merchant store</text>
    <text x="162" y="221" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600">shop.crynova.store</text>

    <rect x="122" y="274" width="170" height="72" rx="20" fill="#F8FAFC" stroke="#E2E8F0"/>
    <rect x="146" y="296" width="70" height="12" rx="6" fill="#0F172A"/>
    <rect x="146" y="319" width="112" height="10" rx="5" fill="#CBD5E1"/>
    <circle cx="262" cy="311" r="17" fill="#DBEAFE"/>
    <path d="M254 311H270M262 303V319" stroke="#2563EB" stroke-width="3" stroke-linecap="round"/>

    <rect x="122" y="374" width="170" height="74" rx="20" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="146" y="403" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700">Cart total</text>
    <text x="146" y="430" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="900">$248.90</text>
    <rect x="230" y="400" width="42" height="22" rx="11" fill="#ECFDF5"/>
    <text x="240" y="415" fill="#059669" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="900">LIVE</text>
  </g>

