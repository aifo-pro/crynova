    <rect x="390" y="118" width="260" height="422" rx="34" fill="#FFFFFF" stroke="#D9E3EF"/>
    <rect x="422" y="150" width="196" height="88" rx="26" fill="url(#brand)"/>
    <circle cx="462" cy="194" r="22" fill="#FFFFFF" fill-opacity="0.18"/>
    <path d="M451 196L463 184H477L465 198H478L459 214L464 200H451V196Z" fill="#FFFFFF"/>
    <text x="496" y="190" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">Crynova</text>
    <text x="496" y="214" fill="#DBEAFE" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700">Payment gateway</text>

    <rect x="422" y="270" width="196" height="72" rx="20" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="446" y="299" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700">Invoice created</text>
    <text x="446" y="322" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">INV-8F42</text>
    <rect x="546" y="292" width="46" height="22" rx="11" fill="#ECFDF5"/>
    <text x="558" y="307" fill="#059669" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="900">PAID</text>

    <rect x="422" y="362" width="196" height="72" rx="20" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="446" y="390" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700">Confirmations</text>
    <text x="446" y="416" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900">19 / 19</text>
    <circle cx="570" cy="399" r="18" fill="#ECFDF5"/>
    <path d="M562 399L568 405L580 392" stroke="#10B981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="422" y="454" width="196" height="54" rx="18" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="446" y="487" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="900">Webhook delivered</text>
    <circle cx="582" cy="481" r="12" fill="#10B981"/>
    <path d="M576 481L581 486L588 477" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g filter="url(#cardShadow)">
    <rect x="718" y="164" width="230" height="330" rx="30" fill="#FFFFFF" stroke="#E2E8F0"/>
    <rect x="748" y="196" width="170" height="58" rx="20" fill="#0F172A"/>
    <text x="784" y="232" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="900">Customer payment</text>

    <rect x="748" y="286" width="170" height="82" rx="20" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="772" y="315" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="700">Amount to pay</text>
    <text x="772" y="344" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900">248.90 USDT</text>

    <rect x="748" y="394" width="170" height="54" rx="18" fill="#FFFFFF" stroke="#E2E8F0"/>
    <circle cx="775" cy="421" r="14" fill="#26A17B"/>
    <text x="770" y="426" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="900">T</text>
    <text x="802" y="426" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="900">USDT TRC20</text>

    <rect x="748" y="466" width="170" height="46" rx="17" fill="url(#success)"/>
    <text x="793" y="495" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="900">Payment paid</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="156" y="100" width="76" height="40" rx="20" fill="#FFFFFF" stroke="#E2E8F0"/>
    <circle cx="180" cy="120" r="13" fill="#F7931A"/>
    <text x="176" y="125" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="900">B</text>
    <text x="203" y="125" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="900">BTC</text>

    <rect x="770" y="98" width="76" height="40" rx="20" fill="#FFFFFF" stroke="#E2E8F0"/>
    <circle cx="794" cy="118" r="13" fill="#627EEA"/>
    <text x="790" y="123" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="900">E</text>
    <text x="817" y="123" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="900">ETH</text>

    <rect x="154" y="520" width="78" height="40" rx="20" fill="#FFFFFF" stroke="#E2E8F0"/>
    <circle cx="178" cy="540" r="13" fill="#2563EB"/>
    <text x="174" y="545" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="900">T</text>
    <text x="204" y="545" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="900">TRX</text>

    <rect x="776" y="522" width="92" height="40" rx="20" fill="#FFFFFF" stroke="#E2E8F0"/>
    <circle cx="800" cy="542" r="13" fill="#26A17B"/>
    <text x="796" y="547" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="900">T</text>
    <text x="824" y="547" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="900">USDT</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="284" y="568" width="470" height="46" rx="23" fill="#FFFFFF" stroke="#E2E8F0"/>
    <circle cx="316" cy="591" r="12" fill="#10B981"/>
    <path d="M310 591L315 596L322 587" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="340" y="596" fill="#0F172A" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="900">Order fulfilled after webhook confirmation</text>
    <text x="630" y="596" fill="#64748B" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700">2.4s delivery</text>
  </g>
</svg>
