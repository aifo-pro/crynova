name: Deploy to VDS

# Авто-деплой при пуше в main. Требует GitHub Secrets:
#   SSH_HOST  — IP/домен сервера
#   SSH_USER  — пользователь приложения (напр. crynova)
#   SSH_KEY   — приватный SSH-ключ (с доступом к серверу)
#   SSH_PORT  — порт SSH (опц., по умолчанию 22)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd /var/www/crynova
            BRANCH=main bash deploy/deploy.sh
